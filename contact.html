
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact</title>

<!-- ICON LIB -->
<script src="https://unpkg.com/lucide@latest"></script>

<style>

/* RESET */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Inter", sans-serif;
}

body{
background:#020202;
color:white;
}

/* GLOW */
body::before{
content:"";
position:absolute;
top:-180px;
left:50%;
transform:translateX(-50%);
width:850px;
height:550px;
background:radial-gradient(circle, rgba(0,255,200,0.22), transparent 70%);
filter:blur(100px);
z-index:-1;
}

/* NAVBAR */
.navbar{
position:fixed;
top:28px;
left:50%;
transform:translateX(-50%);
display:flex;
align-items:center;
gap:24px;
padding:10px 20px;
border-radius:16px;
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.08);
backdrop-filter:blur(14px);
}

.navbar a{
display:flex;
align-items:center;
gap:6px;
color:#d0d0d0;
font-size:13px;
text-decoration:none;
}

/* ICON SIZE */
.navbar i{
width:14px;
height:14px;
}

/* BUTTON */
.navbar .btn{
padding:6px 14px;
border-radius:10px;
background:rgba(255,255,255,0.08);
}

/* LAYOUT */
.container{
max-width:1150px;
margin:150px auto;
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
padding:0 30px;
}

/* LEFT */
.left{
position:relative;
}

.watermark{
position:absolute;
top:-45px;
left:40px;
font-size:130px;
font-weight:800;
color:rgba(255,255,255,0.05);
}

/* TAG WITH ICON */
.tag{
display:inline-flex;
align-items:center;
gap:6px;
padding:6px 14px;
border-radius:20px;
background:rgba(255,255,255,0.06);
font-size:11px;
margin-top:100px;
}

.tag i{
width:12px;
height:12px;
}

.left h1{
font-size:40px;
font-weight:300;
margin:5px 0 10px;
}

.left p{
font-size:16px;
color:#9c9c9c;
margin-bottom:15px;
}

/* CARD */
.card{
display:flex;
justify-content:space-between;
align-items:center;
padding:12px 14px;
border-radius:14px;
background:rgba(255,255,255,0.04);
border:1px solid rgba(255,255,255,0.07);
margin-bottom:12px;
}

.card-left{
display:flex;
gap:12px;
}

.icon{
width:38px;
height:38px;
border-radius:10px;
background:rgba(255,255,255,0.07);
display:flex;
align-items:center;
justify-content:center;
}

.text h4{
font-size:13px;
font-weight:400;
}

.text p{
font-size:12px;
color:#8f8f8f;
}

.arrow{
font-size:15px;
opacity:0.7;
}

/* FORM */
.form{
padding:26px;
border-radius:16px;
background:rgba(255,255,255,0.04);
border:1px solid rgba(255,255,255,0.07);
display:flex;
flex-direction:column;
margin-top:60px;
height:450px;
}

input, textarea{
width:100%;
padding:13px;
border-radius:10px;
border:1px solid rgba(255,255,255,0.07);
background:rgba(255,255,255,0.02);
color:white;
margin-bottom:12px;
}

textarea{
height:150px;
}

button{
margin-top:auto;
padding:13px;
border:none;
border-radius:10px;
background:#e6e6e6;
color:black;
cursor:pointer;
}

/* RESPONSIVE */
@media(max-width:900px){
.container{
grid-template-columns:1fr;
}
}

</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">

<!-- ICON ONLY HERE -->
<a href="#">
<i data-lucide="home"></i>
Home
</a>

<a href="#">Integrations</a>
<a href="#">Pricing</a>
<a href="#">Logs</a>
<a href="#">Contact</a>

<a href="#" class="btn">Get Template ↗</a>
</div>

<!-- MAIN -->
<div class="container">

<div class="left">

<div class="watermark">CONTACT</div>

<!-- ICON ONLY HERE -->
<div class="tag">
<i data-lucide="mail"></i>
Contact
</div>

<h1>Get in touch</h1>

<p>
Have questions or ready to transform <br>
your business with AI automation?
</p>

<div class="card">
<div class="card-left">
<div class="icon"><i data-lucide="mail"></i></div>
<div>
<h4>Email us</h4>
<p>johnnykova@gmail.com</p>
</div>
</div>
<div class="arrow">↗</div>
</div>

<div class="card">
<div class="card-left">
<div class="icon"><i data-lucide="phone"></i></div>
<div>
<h4>Call us</h4>
<p>(601) 123-4567</p>
</div>
</div>
<div class="arrow">↗</div>
</div>

<div class="card">
<div class="card-left">
<div class="icon"><i data-lucide="map-pin"></i></div>
<div>
<h4>Our location</h4>
<p>Crosby Street, NY, US</p>
</div>
</div>
<div class="arrow">↗</div>
</div>

</div>

<div class="form">
<div>
<input type="text" placeholder="Name">
<input type="email" placeholder="Email">
<textarea placeholder="Message"></textarea>
</div>
<button>Submit</button>
</div>

</div>

<script>
lucide.createIcons();
</script>

</body>
</html>
