# Dotted Maps (HTML + CSS + SVG)

```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Dotted Maps</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#f4f4f4;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    font-family:Arial, sans-serif;
}

.map-section{
    width:100%;
    max-width:1500px;
    padding:40px;
}

.map-row{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:80px;
    flex-wrap:wrap;
}

.map-box{
    position:relative;
    width:500px;
    height:350px;
}

svg{
    width:100%;
    height:100%;
}

/* DOTTED STYLE */
.dots{
    fill:url(#dotPattern);
}

/* LINE */
.connection-line{
    position:absolute;
    width:220px;
    height:1px;
    background:#d8d8d8;
    top:70px;
    left:250px;
    transform:rotate(-35deg);
}

/* SMALL DOTTED CIRCLES */
.circle{
    position:absolute;
    width:18px;
    height:18px;
    border-radius:50%;
    background:
    radial-gradient(circle,#bcc2c8 18%,transparent 20%);
    background-size:4px 4px;
    border:1px solid #d8d8d8;
}

.circle.one{
    top:42px;
    left:250px;
}

.circle.two{
    top:165px;
    left:455px;
}

@media(max-width:992px){

.map-row{
    gap:40px;
}

.map-box{
    width:100%;
    max-width:450px;
    height:300px;
}

.connection-line{
    display:none;
}

}

@media(max-width:576px){

.map-section{
    padding:20px;
}

.map-box{
    height:230px;
}

}

</style>
</head>
<body>

<section class="map-section">

<div class="map-row">

    <!-- LEFT MAP -->
    <div class="map-box">

        <svg viewBox="0 0 600 400">

            <defs>
                <pattern id="dotPattern" width="8" height="8" patternUnits="userSpaceOnUse">
                    <circle cx="2" cy="2" r="1.2" fill="#b8bec5" />
                </pattern>
            </defs>

            <!-- COMPLETE CHINA MAP -->
            <path class="dots"
